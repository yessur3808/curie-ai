name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        # Flake8 settings are read from .flake8 in the repo root.
        run: |
          flake8 agent/ connectors/ llm/ memory/ services/ utils/ main.py tests/ \
            --exclude=__pycache__,migrations

  format-check:
    name: Format check (black)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install black
        run: pip install black

      - name: Check formatting
        run: black --check agent/ connectors/ llm/ memory/ services/ utils/ main.py tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        # Install only the lightweight subset needed for the unit tests.
        # Heavy optional packages (llama-cpp-python, discord.py, etc.) are
        # mocked inside the test suite and are not required here.
        run: |
          pip install \
            pytest \
            pytest-asyncio \
            python-dotenv \
            pytz \
            fastapi \
            pydantic

      - name: Run tests
        run: pytest tests/ -v --tb=short
